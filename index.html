<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascension Leaderboard</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/j5B1nLhX/Silver-Arrow-Emblem-with-Wings-removebg-preview.png">
    <style>
        /* Black and White Theme */
        :root {
            --bg-color: #000000;
            --card-bg: #111111;
            --hover-bg: #1f1f1f;
            --text-main: #ffffff;
            --text-muted: #888888;
            --border-color: #333333;
            
            /* Rank Colors */
            --rank-1: #ffffff;
            --rank-2: #cccccc;
            --rank-3: #777777;
            --rank-other: #222222;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }
        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,10%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,20%,10%,1) 0, transparent 50%);
        }
        #ambientGlow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: -1;
            background: radial-gradient(circle 800px at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(200, 225, 255, 0.05), transparent 80%);
            transition: background 0.1s;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Header Section --- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .search-container {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .search-container input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 16px 10px 40px;
            border-radius: 20px;
            color: #fff;
            font-size: 14px;
            width: 200px;
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            font-family: inherit;
        }

        .search-container input:focus {
            outline: none;
            width: 280px;
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 15px rgba(255,255,255,0.05);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            width: 16px;
            height: 16px;
            color: #888;
            pointer-events: none;
        }

        .site-logo {
            height: 60px;
            width: auto;
            object-fit: contain; 
            filter: drop-shadow(0px 0px 5px rgba(255, 255, 255, 0.2));
        }

        @keyframes titleGlow {
            0%, 100% { filter: drop-shadow(0 0 5px rgba(255,255,255,0.1)); }
            50% { filter: drop-shadow(0 0 15px rgba(255,255,255,0.4)) drop-shadow(0 0 30px rgba(255,255,255,0.1)); }
        }

        .site-title {
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(180deg, #ffffff 0%, #b0b0b0 50%, #7a7a7a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleGlow 3s ease-in-out infinite;
            margin-left: 10px;
        }

        /* --- Category Tabs --- */
        .tabs {
            display: flex;
            gap: 12px;
            background-color: var(--card-bg);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            overflow-x: auto;
            border: 1px solid var(--border-color);
        }

        .tab {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px; 
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }

        .tab::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: #fff;
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            transform: translateX(-50%);
        }

        .tab.active::after, .tab:hover::after {
            width: 60%;
        }

        .tab:active {
            transform: scale(0.95);
        }

        .tab img {
            width: 18px;
            height: 18px;
            object-fit: contain;
            opacity: 0.5;
            transition: all 0.3s ease;
            mix-blend-mode: screen;
        }

        .tab.active, .tab:hover {
            background-color: var(--hover-bg);
            color: var(--text-main);
        }

        .tab.active img, .tab:hover img {
            opacity: 1;
        }

        /* --- Premium Animations --- */
        @keyframes fadeSlideIn {
            0% { opacity: 0; transform: translateY(20px) scale(0.97); filter: blur(4px); }
            60% { opacity: 1; filter: blur(0); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        @keyframes fadeOpacityOnly {
            0% { opacity: 0; filter: blur(2px); }
            100% { opacity: 1; filter: blur(0); }
        }

        @keyframes fadeSlideOut {
            0% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
            100% { opacity: 0; transform: translateY(-15px) scale(0.98); filter: blur(4px); }
        }

        @keyframes rowEntrance {
            0% { opacity: 0; transform: translateX(-30px) scale(0.95); }
            60% { transform: translateX(5px) scale(1.01); }
            100% { opacity: 1; transform: translateX(0) scale(1); }
        }

        @keyframes colDrop {
            0% { opacity: 0; transform: translateY(-40px) scale(0.9); }
            70% { transform: translateY(5px) scale(1.02); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 5px rgba(255,255,255,0.05); }
            50% { box-shadow: 0 0 15px rgba(255,255,255,0.1); }
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        @keyframes neonPulse {
            0%, 100% { 
                box-shadow: 
                    0 0 8px rgba(255,255,255,0.6),
                    0 0 20px rgba(255,255,255,0.3),
                    0 0 40px rgba(255,255,255,0.1),
                    inset 0 0 8px rgba(255,255,255,0.05);
            }
            50% { 
                box-shadow: 
                    0 0 14px rgba(255,255,255,0.9),
                    0 0 35px rgba(255,255,255,0.45),
                    0 0 60px rgba(255,255,255,0.15),
                    inset 0 0 12px rgba(255,255,255,0.08);
            }
        }

        @keyframes neonPulseGold {
            0%, 100% { box-shadow: 0 0 10px rgba(223,166,50,0.4), 0 0 25px rgba(223,166,50,0.15), 0 8px 20px rgba(0,0,0,0.4); }
            50% { box-shadow: 0 0 18px rgba(223,166,50,0.7), 0 0 45px rgba(223,166,50,0.25), 0 8px 25px rgba(0,0,0,0.5); }
        }

        @keyframes neonPulseSilver {
            0%, 100% { box-shadow: 0 0 10px rgba(138,149,153,0.4), 0 0 25px rgba(138,149,153,0.15), 0 8px 20px rgba(0,0,0,0.4); }
            50% { box-shadow: 0 0 18px rgba(138,149,153,0.7), 0 0 45px rgba(138,149,153,0.25), 0 8px 25px rgba(0,0,0,0.5); }
        }

        @keyframes neonPulseBronze {
            0%, 100% { box-shadow: 0 0 10px rgba(194,104,40,0.4), 0 0 25px rgba(194,104,40,0.15), 0 8px 20px rgba(0,0,0,0.4); }
            50% { box-shadow: 0 0 18px rgba(194,104,40,0.7), 0 0 45px rgba(194,104,40,0.25), 0 8px 25px rgba(0,0,0,0.5); }
        }

        @keyframes gentleBob {
            0%, 100% { transform: translateY(-4px) scale(1.02); }
            50%      { transform: translateY(-6px) scale(1.02); }
        }

        @keyframes sweepLight {
            0% { transform: translateX(-100px) skewX(-20deg); }
            20%, 100% { transform: translateX(200px) skewX(-20deg); }
        }

        @keyframes hoverSweep {
            0% { left: -100%; }
            100% { left: 150%; }
        }

        @keyframes neonPulseLight {
            0%, 100% { 
                box-shadow: 
                    0 0 4px rgba(255,255,255,0.4),
                    0 0 10px rgba(255,255,255,0.2),
                    0 0 20px rgba(255,255,255,0.05);
            }
            50% { 
                box-shadow: 
                    0 0 8px rgba(255,255,255,0.7),
                    0 0 20px rgba(255,255,255,0.3),
                    0 0 35px rgba(255,255,255,0.1);
            }
        }

        @keyframes neonBobLight {
            0%, 100% { transform: translateY(-3px) scale(1.015); }
            50%      { transform: translateY(-1px) scale(1.005); }
        }

        .fade-in {
            animation: fadeSlideIn 0.5s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
        }

        .fade-out {
            animation: fadeSlideOut 0.25s cubic-bezier(0.55, 0.085, 0.68, 0.53) forwards;
        }

        .fade-opacity {
            animation: fadeOpacityOnly 0.4s ease forwards;
        }

        /* --- Overall View Container --- */
        #overallView {
            display: block;
        }

        .leaderboard-header {
            display: grid;
            grid-template-columns: 150px 2.5fr 0.8fr 4.5fr;
            gap: 15px;
            padding: 10px 10px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
        }

        .player-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        .player-row {
            display: grid;
            grid-template-columns: 150px 2.5fr 0.8fr 4.5fr;
            gap: 15px;
            align-items: center;
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 10px;
            border: 1px solid transparent;
            box-shadow: none;
            transform: translateY(0) scale(1);
            transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1),
                        background 0.4s ease,
                        border-color 0.4s ease,
                        box-shadow 0.45s ease,
                        opacity 0.4s ease;
            opacity: 1;
            position: relative;
        }

        /* --- Kích thước to hơn cho Top 1, 2, 3 --- */
        .player-row.rank-row-1 { padding: 12px 10px; margin: 5px 0; border-color: rgba(223,166,50,0.3); }
        .player-row.rank-row-2 { padding: 11px 10px; margin: 3px 0; border-color: rgba(138,149,153,0.25); }
        .player-row.rank-row-3 { padding: 10px; margin: 2px 0; border-color: rgba(194,104,40,0.15); }

        /* Default hover: white neon (#4+) */
        .player-row:hover {
            transform: translateY(-4px) scale(1.02);
            background: linear-gradient(135deg, var(--hover-bg) 0%, rgba(40,40,40,1) 100%);
            border-color: rgba(255,255,255,0.5);
            box-shadow: 0 0 12px rgba(255,255,255,0.4),
                        0 0 30px rgba(255,255,255,0.12),
                        0 8px 20px rgba(0,0,0,0.4);
            z-index: 10;
            animation: gentleBob 3s ease-in-out 0.5s infinite;
        }

        .retired-badge {
            opacity: 0.6;
            font-size: 0.8em;
            text-transform: uppercase;
            font-style: italic;
        }

        .board-player-card.retired-card {
            opacity: 0.6;
            filter: grayscale(0.6);
            font-style: italic;
        }

        /* #1 Gold glow */
        .player-row.rank-row-1:hover {
            transform: translateY(-4px) scale(1.02);
            background: linear-gradient(135deg, rgba(50,40,20,1) 0%, rgba(40,35,15,1) 100%);
            border-color: rgba(223,166,50,0.8);
            box-shadow: 0 0 14px rgba(223,166,50,0.45),
                        0 0 35px rgba(223,166,50,0.15),
                        0 8px 22px rgba(0,0,0,0.45);
            z-index: 10;
        }

        /* #2 Silver glow */
        .player-row.rank-row-2:hover {
            transform: translateY(-4px) scale(1.02);
            background: linear-gradient(135deg, rgba(35,40,45,1) 0%, rgba(30,35,40,1) 100%);
            border-color: rgba(138,149,153,0.8);
            box-shadow: 0 0 14px rgba(138,149,153,0.45),
                        0 0 35px rgba(138,149,153,0.15),
                        0 8px 22px rgba(0,0,0,0.45);
            z-index: 10;
        }

        /* #3 Bronze glow */
        .player-row.rank-row-3:hover {
            transform: translateY(-4px) scale(1.02);
            background: linear-gradient(135deg, rgba(50,30,15,1) 0%, rgba(40,25,12,1) 100%);
            border-color: rgba(194,104,40,0.8);
            box-shadow: 0 0 14px rgba(194,104,40,0.45),
                        0 0 35px rgba(194,104,40,0.15),
                        0 8px 22px rgba(0,0,0,0.45);
            z-index: 10;
        }

        /* Skin scales up on hover */
        .player-row:hover .player-bust {
            transform: translateX(-50%) scale(1.12);
            filter: drop-shadow(0 0 6px rgba(255,255,255,0.25));
        }
        .player-row.rank-row-1:hover .player-bust {
            filter: drop-shadow(0 0 8px rgba(223,166,50,0.5));
        }
        .player-row.rank-row-2:hover .player-bust {
            filter: drop-shadow(0 0 8px rgba(138,149,153,0.5));
        }
        .player-row.rank-row-3:hover .player-bust {
            filter: drop-shadow(0 0 8px rgba(194,104,40,0.5));
        }

        /* --- Premium Rank Banner --- */
        .rank-banner {
            position: relative;
            width: 120px;
            height: 58px;
            display: flex;
            align-items: center;
            clip-path: polygon(0 0, 100% 0, 82% 100%, 0% 100%);
            border-radius: 8px 0 0 8px;
            overflow: hidden;
            flex-shrink: 0;
        }

        /* Top 1-3 banners wider */
        .rank-banner.rank-1 { width: 150px; height: 65px; }
        .rank-banner.rank-2 { width: 140px; height: 62px; }
        .rank-banner.rank-3 { width: 135px; height: 60px; }
        
        /* Glass reflection panel for top 3 */
        .rank-1::after, .rank-2::after, .rank-3::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.5) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-20deg);
            animation: metalShine 4s infinite cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        @keyframes metalShine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }
            z-index: 3;
            pointer-events: none;
        }

        /* Sweep light animation for top 3 */
        .rank-1::before, .rank-2::before, .rank-3::before {
            content: '';
            position: absolute;
            top: 0;
            left: -60px;
            width: 20px;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.7) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-20deg);
            animation: sweepLight 4s infinite cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 5;
            pointer-events: none;
        }

        .rank-number {
            font-size: 26px;
            font-weight: 900;
            font-style: italic;
            color: #ffffff;
            text-shadow: 2px 2px 0 #000, -1.5px -1.5px 0 #000, 1.5px -1.5px 0 #000, -1.5px 1.5px 0 #000, 1.5px 1.5px 0 #000;
            z-index: 2;
            margin-left: 12px;
            min-width: 35px;
        }

        .player-bust {
            height: 100px;
            position: absolute;
            left: 50%;
            top: -8px;
            transform: translateX(-50%);
            z-index: 1;
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), filter 0.4s ease;
        }

        .rank-1 { 
            background: linear-gradient(110deg, #b38728 0%, #fcf6ba 25%, #bf953f 40%, #fbf5b7 60%, #aa771c 100%);
            box-shadow: inset 0 2px 2px rgba(255,255,255,0.8), inset 0 -3px 5px rgba(100,50,0,0.7), 0 5px 15px rgba(0,0,0,0.5);
            border-top: 1px solid #fff394;
            border-bottom: 1px solid #734a00;
        }
        .rank-2 { 
            background: linear-gradient(110deg, #8c9398 0%, #e8ebf0 25%, #9fa5a9 40%, #f3f6f9 60%, #7b8388 100%);
            box-shadow: inset 0 2px 2px rgba(255,255,255,0.9), inset 0 -3px 5px rgba(50,55,60,0.7), 0 5px 15px rgba(0,0,0,0.5);
            border-top: 1px solid #ffffff;
            border-bottom: 1px solid #545c61;
        }
        .rank-3 { 
            background: linear-gradient(110deg, #995522 0%, #f5c49f 25%, #bd6a33 40%, #f9d8b8 60%, #884411 100%);
            box-shadow: inset 0 2px 2px rgba(255,210,180,0.7), inset 0 -3px 5px rgba(80,30,0,0.7), 0 5px 15px rgba(0,0,0,0.5);
            border-top: 1px solid #ffdec2;
            border-bottom: 1px solid #5c2400;
        }
        .rank-other { background-color: #1c2227; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }

        .player-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .name-wrapper h3 {
            font-size: 18px;
            margin-bottom: 2px;
            color: var(--text-main);
        }

        .title {
            font-size: 14px;
            color: var(--text-muted);
        }
        
        .title span {
            color: var(--text-main);
            font-weight: bold;
        }

        .region {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            background-color: #222;
            color: #ccc;
            border: 1px solid #444;
        }
        .region.AS { background-color: rgba(46,204,113,0.2); color: #2ecc71; border-color: rgba(46,204,113,0.3); }
        .region.EU { background-color: rgba(241,196,15,0.2); color: #f1c40f; border-color: rgba(241,196,15,0.3); }
        .region.SA { background-color: rgba(0,210,255,0.2); color: #00d2ff; border-color: rgba(0,210,255,0.3); }
        .region.AU { background-color: rgba(181,52,219,0.2); color: #b534db; border-color: rgba(181,52,219,0.3); }
        .region.NA { background-color: rgba(100,100,255,0.2); color: #6b6bff; border-color: rgba(100,100,255,0.3); }

        /* --- Overall Tiers Display --- */
        .tiers {
            display: flex;
            gap: 6px;
            flex-wrap: nowrap;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding: 2px 0;
        }
        .tiers::-webkit-scrollbar { display: none; }

        .tier-item {
            width: 62px; 
            height: 50px; 
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background: #151515;
            border-radius: 6px;
            border: 1px solid #2a2a2a;
            box-sizing: border-box;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }

        .tier-item:hover {
            border-color: #555;
            background: #1a1a1a;
        }

        .tier-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            font-size: 11px;
            font-weight: 600;
            color: #aaa;
            white-space: nowrap;
        }

        .tier-title img {
            width: 13px;
            height: 13px;
            object-fit: contain;
            mix-blend-mode: screen;
            border-radius: 50%;
            filter: contrast(1.4) brightness(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s;
        }

        .tier-item:hover .tier-title img {
            transform: scale(1.3) translateY(-1px);
            filter: contrast(1.4) brightness(1.2);
        }


        .tier-badge {
            font-size: 12px;
            font-weight: bold;
            padding: 1px 10px;
            border-radius: 4px;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            transition: all 0.3s ease;
        }
        
        .tier-badge.top-1 { background: #2a2410; color: #d1b054; border-color: #635223; box-shadow: 0 0 5px rgba(209,176,84,0.1); }
        .tier-badge.top-2 { background: #192025; color: #c4d4e6; border-color: #435b73; box-shadow: 0 0 5px rgba(196,212,230,0.1); }
        .tier-badge.top-3 { background: #2a1b12; color: #b8825c; border-color: #6b452b; box-shadow: 0 0 5px rgba(184,130,92,0.1); }

        .tier-badge.retired-badge {
            opacity: 0.6;
            font-style: italic;
            filter: grayscale(0.5);
        }

        .tier-item:hover .tier-badge {
            border-color: rgba(255,255,255,0.4);
            box-shadow: 0 0 8px rgba(255,255,255,0.2);
        }

        /* --- Delete Button (Nút xóa) --- */
        .delete-btn {
            background: #1a0000;
            color: #ff4a4a;
            border: 1px solid #3a0000;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: 0.2s;
            font-size: 20px;
            font-weight: bold;
        }

<script>
    // Image URLs from postimg.cc
    const IMG = {
        overall: 'https://i.postimg.cc/Qxw2KYfG/overall.jpg',
        ltms:    'https://i.postimg.cc/MT6NJCpf/2v2.jpg',
        sword:   'https://i.postimg.cc/fykPJYXN/sword.jpg',
        axe:     'https://i.postimg.cc/ZYDgXDtT/axe.jpg',
        mace:    'https://i.postimg.cc/wTCrjyjZ/mace.jpg',
        vanilla: 'https://i.postimg.cc/YCQsGr4V/vanilla.jpg',
        uhc:     'https://i.postimg.cc/RFps5qYp/uhc.jpg',
        pot:     'https://i.postimg.cc/prgsr4RB/pot.jpg',
        nethop:  'https://i.postimg.cc/28ZHMkxR/nethop.jpg',
        smp:     'https://i.postimg.cc/Jz3p7pgP/smp.jpg',
        tier1:   'https://i.postimg.cc/Qxw2KYfG/overall.jpg',
        tier2:   'https://i.postimg.cc/7PFvfQBj/tier-2.jpg',
        tier3:   'https://i.postimg.cc/d1hX08Gq/tier-3.jpg',
    };

    const categories = [
        { id: 'sword',   icon: IMG.sword,   name: 'Sword' },
        { id: 'axe',     icon: IMG.axe,     name: 'Axe' },
        { id: 'mace',    icon: IMG.mace,    name: 'Mace' },
        { id: 'vanilla', icon: IMG.vanilla, name: 'Vanilla' },
        { id: 'uhc',     icon: IMG.uhc,     name: 'UHC' },
        { id: 'pot',     icon: IMG.pot,     name: 'Pot' },
        { id: 'nethop',  icon: IMG.nethop,  name: 'NethOP' },
        { id: 'smp',     icon: IMG.smp,     name: 'SMP' }
    ];

    // Tạo HTML cho menu Tabs
    const tabsContainer = document.getElementById('categoryTabs');
    tabsContainer.innerHTML = `<div class="tab active" data-target="overall"><img src="${IMG.overall}" alt="Overall"> Overall</div>`;
    
    categories.forEach(cat => {
        tabsContainer.innerHTML += `<div class="tab" data-target="${cat.id}"><img src="${cat.icon}" alt="${cat.name}"> ${cat.name}</div>`;
    });

    let currentActiveTab = 'overall';

    // Bảng điểm theo position
    const POSITION_POINTS = { 1: 10, 2: 7, 3: 5, 4: 3, 5: 1 };

    // Tính tổng điểm từ stats
    function calcPoints(stats) {
        let total = 0;
        categories.forEach(cat => {
            let pos = stats[cat.id];
            if (pos) {
                if (typeof pos === 'string' && pos.startsWith('r')) {
                    pos = parseInt(pos.substring(1));
                }
                if (POSITION_POINTS[pos] !== undefined) {
                    total += POSITION_POINTS[pos];
                }
            }
        });
        return total;
    }

    // Xác định title dựa trên điểm
    function getTitle(points) {
        if (points >= 80) return 'Combat Grandmaster';
        if (points >= 50) return 'Combat Master';
        if (points >= 30) return 'Combat Ace';
        if (points >= 15) return 'Combat Specialist';
        return 'Fighter';
    }

    // --- Firebase Setup ---
    const firebaseConfig = {
        apiKey: 'AIzaSyDOJq7SNRIMDHY8p1R8wbmjjj89-FpP4GE',
        databaseURL: 'https://accension-leaderboard-default-rtdb.asia-southeast1.firebasedatabase.app/'
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const playersRef = db.ref('players');

    // Load cache ngay lập tức để hiển thị nhanh
    const cached = localStorage.getItem('accension_players');
    let players = cached ? JSON.parse(cached) : [];
    let firebaseReady = false;

    function sortPlayers() {
        players.sort((a, b) => calcPoints(b.stats) - calcPoints(a.stats));
    }

    function renderCurrentView() {
        if (currentActiveTab === 'overall') {
            renderOverallLeaderboard();
        } else {
            renderBoardView(currentActiveTab);
        }
        updateFooterStats();
    }

    // Hiển thị ngay từ cache
    renderCurrentView();

    // Sync Firebase ngầm
    firebase.auth().signInAnonymously()
        .then(() => {
            playersRef.on('value', (snapshot) => {
                firebaseReady = true;
                const data = snapshot.val();
                let newData = [];
                if (data) {
                    const arr = Array.isArray(data) ? data : Object.values(data);
                    newData = arr.filter(p => p && p.name && p.stats);
                }
                
                // Only re-render if data actually changed to prevent double-loading flicker
                if (JSON.stringify(players) !== JSON.stringify(newData)) {
                    players = newData;
                    localStorage.setItem('accension_players', JSON.stringify(players));
                    renderCurrentView();
                } else {
                    players = newData;
                }
            }, (error) => {
                console.error('Firebase read error:', error);
            });
        })
        .catch((error) => {
            console.error('Firebase auth error:', error);
        });

    // Logic Đổi Tab với fade animation
    function switchView(newTab) {
        const overallView = document.getElementById('overallView');
        const boardView = document.getElementById('boardView');
        const currentVisible = overallView.style.display !== 'none' ? overallView : (boardView.style.display !== 'none' ? boardView : overallView);

        // Fade out current view
        currentVisible.classList.remove('fade-in');
        currentVisible.classList.add('fade-out');

        setTimeout(() => {
            // Hide old view
            currentVisible.classList.remove('fade-out');
            overallView.style.display = 'none';
            boardView.style.display = 'none';

            // Footer animation
            const footer = document.querySelector('.footer-stats');
            if (footer) {
                footer.classList.remove('fade-opacity');
                void footer.offsetWidth; // trigger reflow
                footer.classList.add('fade-opacity');
            }

            // Show & render new view
            if (newTab === 'overall') {
                overallView.style.display = 'block';
                renderOverallLeaderboard();
                overallView.classList.add('fade-in');
            } else {
                boardView.style.display = 'grid';
                renderBoardView(newTab);
                boardView.classList.add('fade-in');
            }
        }, 250); // match fadeOut duration
    }

    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            const newTarget = tab.getAttribute('data-target');
            if (newTarget === currentActiveTab) return; // skip if same tab

            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentActiveTab = newTarget;
            switchView(currentActiveTab);
        });
    });

    // Hàm Render Giao diện Tổng (Overall)
    function renderOverallLeaderboard() {
        const list = document.getElementById('playerList');
        list.innerHTML = ''; 

        sortPlayers();

        players.forEach((player, index) => {
            const rank = index + 1;
            
            let rankClass = 'rank-other';
            if (rank === 1) rankClass = 'rank-1';
            else if (rank === 2) rankClass = 'rank-2';
            else if (rank === 3) rankClass = 'rank-3';

            let tiersHTML = '';
            categories.forEach(cat => {
                let val = player.stats[cat.id];
                if(val) {
                    let badgeClass = 'tier-badge';
                    let displayVal = val;
                    let isRetired = false;

                    if (typeof val === 'string' && val.startsWith('r')) {
                        isRetired = true;
                        val = parseInt(val.substring(1));
                        displayVal = `#r${val}`;
                    } else {
                        displayVal = `#${val}`;
                    }

                    if(val === 1) badgeClass += ' top-1';
                    else if(val === 2) badgeClass += ' top-2';
                    else if(val === 3) badgeClass += ' top-3';
                    
                    if (isRetired) badgeClass += ' retired-badge';

                    tiersHTML += `
                    <div class="tier-item" onclick="goToBoard('${cat.id}', '${player.name}')">
                        <div class="tier-title">
                            <img src="${cat.icon}" alt="${cat.name}"> 
                            ${cat.name}
                        </div>
                        <div class="${badgeClass}">${displayVal}</div>
                    </div>`;
                }
            });

            let rowClassExtra = '';
            if (rank === 1) rowClassExtra = 'rank-row-1';
            else if (rank === 2) rowClassExtra = 'rank-row-2';
            else if (rank === 3) rowClassExtra = 'rank-row-3';

            const bustUrl = `https://mc-heads.net/body/${player.name}/100`;

            const row = document.createElement('div');
            row.className = `player-row ${rowClassExtra}`;
            row.style.animationDelay = `${index * 0.08}s`;
            
            row.innerHTML = `
                <div class="rank-banner ${rankClass}" onclick="openPlayerProfile('${player.name}')" style="cursor: pointer;">
                    <div class="rank-number">${rank}.</div>
                    <img src="${bustUrl}" alt="bust" class="player-bust" onerror="this.src='https://crafatar.com/renders/body/606e2ff0ed7748429d6ce0927ce6486?size=100'">
                </div>
                
                <div class="player-info" onclick="openPlayerProfile('${player.name}')" style="cursor: pointer;">
                    <div class="name-wrapper">
                        <h3>${player.name}</h3>
                        <div class="title">❖ ${getTitle(calcPoints(player.stats))} (<span>${calcPoints(player.stats)} pts</span>)</div>
                    </div>
                </div>

                <div>
                    <span class="region ${player.region}">${player.region}</span>
                </div>

                <div class="tiers">
                    ${tiersHTML}
                </div>
            `;

            list.appendChild(row);
        });
    }

    // Hàm Render Giao Diện Cột Tiers (Board View)
    function renderBoardView(category) {
        const board = document.getElementById('boardView');
        board.innerHTML = '';
        
        sortPlayers();

        const columnsData = [
            { num: 1, title: "#1", iconSrc: IMG.tier1, class: "col-header-1" },
            { num: 2, title: "#2", iconSrc: IMG.tier2, class: "col-header-2" },
            { num: 3, title: "#3", iconSrc: IMG.tier3, class: "col-header-3" },
            { num: 4, title: "#4", iconSrc: null, class: "col-header-4" },
            { num: 5, title: "#5", iconSrc: null, class: "col-header-5" }
        ];

        columnsData.forEach((colInfo, colIndex) => {
            const colDiv = document.createElement('div');
            colDiv.className = 'board-col';
            colDiv.style.animationDelay = `${colIndex * 0.1}s`;

            let headerIconHTML = colInfo.iconSrc ? `<img src="${colInfo.iconSrc}" alt="Rank ${colInfo.num}">` : '';

            let htmlContent = `
                <div class="board-header ${colInfo.class}">
                    ${headerIconHTML} ${colInfo.title}
                </div>
                <div class="board-players-container">
            `;

            // Lọc data theo category
            let matchingPlayers = players.filter(p => {
                let v = p.stats[category];
                if (typeof v === 'string' && v.startsWith('r')) {
                    return parseInt(v.substring(1)) === colInfo.num;
                }
                return v === colInfo.num;
            });

            // Sắp xếp: Active trước, Retired sau
            matchingPlayers.sort((a, b) => {
                let aVal = a.stats[category];
                let bVal = b.stats[category];
                let aSort = (typeof aVal === 'string' && aVal.startsWith('r')) ? 1 : 0;
                let bSort = (typeof bVal === 'string' && bVal.startsWith('r')) ? 1 : 0;
                return aSort - bSort;
            });

            matchingPlayers.forEach(p => {
                const avatarUrl = `https://mc-heads.net/avatar/${p.name}/50`;
                let v = p.stats[category];
                let isRetired = (typeof v === 'string' && v.startsWith('r'));
                let cardClass = isRetired ? 'board-player-card retired-card' : 'board-player-card';
                let namePrefix = isRetired ? '[R] ' : '';

                htmlContent += `
                    <div class="${cardClass}" onclick="openPlayerProfile('${p.name}')" style="cursor: pointer;">
                        <div class="card-region-tag ${p.region}">${p.region}</div>
                        <img src="${avatarUrl}" class="avatar" alt="${p.name}" onerror="this.src='https://crafatar.com/avatars/606e2ff0ed7748429d6ce0927ce6486?size=50'">
                        <span class="name">${namePrefix}${p.name}</span>
                    </div>
                `;
            });

            htmlContent += `</div>`;
            colDiv.innerHTML = htmlContent;
            board.appendChild(colDiv);

            // Th\u00eam hi\u1ec7u \u1ee9ng hover m\u01b0\u1ee3t cho t\u1eebng card trong c\u1ed9t
            colDiv.querySelectorAll('.board-player-card').forEach(card => {
                let bobTimer;
                card.addEventListener('mouseenter', () => {
                    bobTimer = setTimeout(() => card.classList.add('bobbing'), 500);
                });
                card.addEventListener('mouseleave', () => {
                    clearTimeout(bobTimer);
                    card.classList.remove('bobbing');
                });
            });
        });
    }
    // JS Add/Delete Removed for Discord Bot

    function updateFooterStats() {
        document.getElementById('statTotalPlayers').innerText = players.length;
        let totalPlacements = 0;
        let highestScore = 0;
        players.forEach(p => {
            let placements = Object.keys(p.stats || {}).length;
            totalPlacements += placements;
            let score = calcPoints(p.stats);
            if(score > highestScore) highestScore = score;
        });
        document.getElementById('statTotalPlacements').innerText = totalPlacements;
        document.getElementById('statTopScore').innerText = highestScore;
    }

    // --- Player Profile Modal Logic ---
    function openPlayerProfile(playerName) {
        const player = players.find(p => p.name === playerName);
        if(!player) return;

        // Calculate rank
        sortPlayers();
        const rank = players.findIndex(p => p.name === playerName) + 1;
        const pts = calcPoints(player.stats);
        
        document.getElementById('modalAvatar').src = `https://mc-heads.net/avatar/${player.name}/200`;
        document.getElementById('modalAvatar').onerror = function() { this.src='https://crafatar.com/avatars/606e2ff0ed7748429d6ce0927ce6486?size=200'; };
        document.getElementById('modalName').textContent = player.name;
        document.getElementById('modalTitle').innerHTML = `❖ ${getTitle(pts)}`;
        document.getElementById('modalRegion').textContent = player.region;
        document.getElementById('modalNamemc').href = `https://namemc.com/profile/${player.name}`;
        
        document.getElementById('modalOverallRank').textContent = rank + '.';
        document.getElementById('modalOverallPoints').textContent = `(${pts} points)`;

        // Tiers / Positions
        let tiersHTML = '';
        categories.forEach(cat => {
            const val = player.stats[cat.id];
            if(val) {
                let badgeClass = 'badge';
                if(val === 1) badgeClass += ' top-1';
                else if(val === 2) badgeClass += ' top-2';
                else if(val === 3) badgeClass += ' top-3';
                
                tiersHTML += `
                <div class="modal-tier-icon" onclick="goToBoard('${cat.id}', '${playerName}')">
                    <img src="${cat.icon}" alt="${cat.name}">
                    <div class="${badgeClass}">#${val}</div>
                </div>`;
            }
        });
        document.getElementById('modalTiers').innerHTML = tiersHTML;

        document.getElementById('playerModal').classList.add('active');
    }

    function closePlayerProfile() {
        document.getElementById('playerModal').classList.remove('active');
    }

    function goToBoard(categoryId, playerName) {
        closePlayerProfile();
        
        // Update active tab visually
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        const targetTab = document.querySelector(`.tab[data-target="${categoryId}"]`);
        if(targetTab) targetTab.classList.add('active');
        
        currentActiveTab = categoryId;
        switchView(currentActiveTab);

        // Wait for switchView animation (250ms) to finish rendering board
        setTimeout(() => {
            const cards = document.querySelectorAll('.board-player-card');
            for(let card of cards) {
                if(card.querySelector('.name').textContent === playerName) {
                    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    card.classList.add('neon-blink');
                    setTimeout(() => card.classList.remove('neon-blink'), 1200);
                    break;
                }
            }
        }, 300);
    }

    // --- Search Functionality ---
    function handleSearch(event) {
        if (event.key === 'Enter') {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            if (query) {
                const player = players.find(p => p.name.toLowerCase() === query);
                if (player) {
                    openPlayerProfile(player.name);
                } else {
                    alert('Player not found!');
                }
            }
        }
    }

    // --- Interactive Ambient Glow ---
    document.addEventListener('mousemove', e => {
        const glow = document.getElementById('ambientGlow');
        if(glow) {
            glow.style.setProperty('--mouse-x', e.clientX + 'px');
            glow.style.setProperty('--mouse-y', e.clientY + 'px');
        }
    });

</script>
</body>
</html>
